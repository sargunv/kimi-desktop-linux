name: Update Kimi Work

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Rebuild the current upstream version
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-kimi-work
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.upstream.outputs.changed }}
      version: ${{ steps.upstream.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: true

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

      - name: Check upstream version
        id: upstream
        env:
          FORCE: ${{ inputs.force }}
          GH_TOKEN: ${{ github.token }}
        run: |
          upstream="$(node scripts/fetch-upstream.mjs version)"
          packaged="$(sed -n 's/^version: //p' latest-linux.yml)"
          arm_packaged=""
          if [[ -f latest-linux-arm64.yml ]]; then
            arm_packaged="$(sed -n 's/^version: //p' latest-linux-arm64.yml)"
          fi
          tag="kimi-work-v$upstream"
          need_release=false
          if [[ "$FORCE" == "true" ]]; then
            need_release=true
          elif [[ "$upstream" != "$packaged" ]]; then
            need_release=true
          elif [[ "$upstream" != "$arm_packaged" ]]; then
            need_release=true
          elif ! gh release view "$tag" >/dev/null 2>&1; then
            need_release=true
          else
            assets="$(gh release view "$tag" --json assets --jq '.assets[].name')"
            echo "$assets" | grep -qx "kimi-work-$upstream-x86_64.AppImage" || need_release=true
            echo "$assets" | grep -qx "kimi-work-$upstream-aarch64.AppImage" || need_release=true
            echo "$assets" | grep -qx "latest-linux.yml" || need_release=true
            echo "$assets" | grep -qx "latest-linux-arm64.yml" || need_release=true
          fi
          if [[ "$need_release" == "true" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$upstream" >> "$GITHUB_OUTPUT"

  build:
    needs: check
    if: needs.check.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    name: build (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: true

      - run: pnpm install --frozen-lockfile

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential p7zip-full python3 rsync xz-utils

      - name: Build AppImage
        env:
          GH_TOKEN: ${{ github.token }}
          KIMI_UPDATE_URL: https://github.com/${{ github.repository }}/releases/latest/download/
        run: |
          pnpm build
          pnpm package

      - name: Upload AppImage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kimi-work-release-${{ matrix.arch }}
          path: |
            dist/*.AppImage
            latest-linux*.yml
          if-no-files-found: error

  publish:
    needs: [check, build]
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kimi-work-release-*
          merge-multiple: true
          path: release-assets

      - name: Stage release assets
        run: |
          mkdir -p dist
          mv release-assets/*.AppImage dist/
          cp release-assets/latest-linux.yml latest-linux.yml
          cp release-assets/latest-linux-arm64.yml latest-linux-arm64.yml
          ls -la dist latest-linux.yml latest-linux-arm64.yml

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          tag="kimi-work-v$VERSION"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.AppImage latest-linux.yml latest-linux-arm64.yml --clobber
            gh release edit "$tag" --latest
          else
            gh release create "$tag" dist/*.AppImage latest-linux.yml latest-linux-arm64.yml \
              --latest --title "Kimi Work $VERSION for Linux" \
              --notes "Unofficial Linux repackaging of Kimi Work $VERSION (x86_64 and aarch64)."
          fi

      - name: Commit update metadata
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add latest-linux.yml latest-linux-arm64.yml
          if ! git diff --cached --quiet; then
            git commit -m "Update Kimi Work to $VERSION"
            git push
          fi
